name: symptom_tracker
description: Track symptoms, spot patterns, and bring clearer records to appointments.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  drift: ^2.22.1
  sqlcipher_flutter_libs: ^0.6.0
  flutter_secure_storage: ^9.2.4
  path_provider: ^2.1.5
  path: ^1.9.1
  google_sign_in: ^6.2.2
  googleapis: ^13.2.0
  googleapis_auth: ^1.6.0
  extension_google_sign_in_as_googleapis_auth: ^2.0.12
  archive: ^4.0.4
  go_router: ^14.8.1
  fl_chart: ^0.70.2
  table_calendar: ^3.2.0
  pdf: ^3.11.2
  printing: ^5.13.5
  share_plus: ^10.1.4
  flutter_local_notifications: ^18.0.1
  intl: ^0.20.2
  shared_preferences: ^2.3.5
  timezone: ^0.10.0
  home_widget: ^0.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  drift_dev: ^2.22.1
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3
  custom_lint:
  riverpod_lint: ^2.6.3
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
